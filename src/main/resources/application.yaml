server:
  port: 8081
spring:
  application:
    name: collectorhub
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/collectorhub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
  redis:
    host: 127.0.0.1
    port: 6379
    password: 123456
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON 响应忽略空字段
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: collectorhub-flash-sale-producer
collectorhub:
  mq:
    flash-sale-topic: collectorhub-flash-sale-order
mybatis-plus:
  type-aliases-package: com.collectorhub.entity # 实体别名扫描包
logging:
  level:
    com.collectorhub: debug